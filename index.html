<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>色彩敏感度挑战｜艺术生专用</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f4f6f8;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .game {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .title {
            text-align: center;
            font-size: 22px;
            margin-bottom: 12px;
            color: #222;
        }
        .info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 15px;
            color: #555;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }
        .block {
            aspect-ratio: 1/1;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.15s;
        }
        .block:hover {
            transform: scale(1.03);
        }
        .tip {
            text-align: center;
            font-size: 16px;
            margin-bottom: 12px;
            min-height: 20px;
        }
        .btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #4a8cf7;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }
        button:active {
            transform: scale(0.97);
        }
        .diff-panel {
            background: #f7f9fc;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            margin-top: 12px;
            display: none;
        }
        .diff-colors {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 8px 0;
        }
        .diff-swatch {
            width: 40px;
            height: 40px;
            border-radius: 6px;
        }
    </style>
</head>
<body>
<div class="game">
    <div class="title">色彩敏感度挑战</div>
    <div class="info">
        <div>得分：<span id="score">0</span></div>
        <div>时间：<span id="time">0</span>s</div>
        <div>难度：<span id="level">1</span></div>
    </div>
    <div class="tip" id="tip"></div>
    <div class="grid" id="grid"></div>
    <div class="diff-panel" id="diffPanel">
        <div>本次色彩差异</div>
        <div class="diff-colors">
            <div class="diff-swatch" id="c1"></div>
            <div class="diff-swatch" id="c2"></div>
        </div>
        <div id="diffText"></div>
    </div>
    <div class="btns">
        <button id="start">开始游戏</button>
        <button id="reset">重置</button>
    </div>
</div>

<script>
    const grid = document.getElementById('grid');
    const scoreText = document.getElementById('score');
    const timeText = document.getElementById('time');
    const levelText = document.getElementById('level');
    const tip = document.getElementById('tip');
    const startBtn = document.getElementById('start');
    const resetBtn = document.getElementById('reset');
    const diffPanel = document.getElementById('diffPanel');
    const c1 = document.getElementById('c1');
    const c2 = document.getElementById('c2');
    const diffText = document.getElementById('diffText');

    let score = 0;
    let level = 1;
    let startTime = 0;
    let timer = null;
    let playing = false;
    let ans = -1;
    let baseColor = '';
    let diffColor = '';

    function randomColor() {
        const h = Math.floor(Math.random() * 360);
        const s = 70 + Math.random() * 20;
        const l = 65 + Math.random() * 15;
        return `hsl(${h}, ${s}%, ${l}%)`;
    }

    function makeDiffColor(base, level) {
        const m = base.match(/hsl\((\d+),\s*([\d.]+)%,\s*([\d.]+)%\)/);
        if (!m) return { color: base, text: '' };
        let h = +m[1], s = +m[2], l = +m[3];
        const step = Math.max(0.4, 2.5 / level);
        const type = Math.floor(Math.random() * 3);
        let text = '';
        if (type === 0) {
            h = (h + (Math.random() > 0.5 ? 1 : -1) * step * 3) % 360;
            text = `色相差异 ≈ ${(step * 3).toFixed(1)}°`;
        } else if (type === 1) {
            s = Math.max(50, Math.min(100, s + (Math.random() > 0.5 ? 1 : -1) * step));
            text = `饱和度差异 ≈ ${step.toFixed(1)}%`;
        } else {
            l = Math.max(40, Math.min(80, l + (Math.random() > 0.5 ? 1 : -1) * step));
            text = `明度差异 ≈ ${step.toFixed(1)}%`;
        }
        return {
            color: `hsl(${h.toFixed(1)}, ${s.toFixed(1)}%, ${l.toFixed(1)}%)`,
            text
        };
    }

    function newRound() {
        grid.innerHTML = '';
        baseColor = randomColor();
        const res = makeDiffColor(baseColor, level);
        diffColor = res.color;
        ans = Math.floor(Math.random() * 25);
        c1.style.background = baseColor;
        c2.style.background = diffColor;
        diffText.innerText = res.text;
        for (let i = 0; i < 25; i++) {
            const d = document.createElement('div');
            d.className = 'block';
            d.style.background = i === ans ? diffColor : baseColor;
            d.onclick = () => choose(i);
            grid.appendChild(d);
        }
    }

    function choose(i) {
        if (!playing) return;
        if (i === ans) {
            tip.innerText = '✅ 正确！';
            tip.style.color = '#00b894';
            diffPanel.style.display = 'block';
            score += Math.round(10 * level);
            level += 0.5;
            scoreText.innerText = score;
            levelText.innerText = level.toFixed(1);
            setTimeout(() => {
                tip.innerText = '';
                diffPanel.style.display = 'none';
                newRound();
            }, 1800);
        } else {
            tip.innerText = '❌ 再试一次';
            tip.style.color = '#e74c3c';
        }
    }

    function start() {
        if (playing) return;
        playing = true;
        startBtn.disabled = true;
        tip.innerText = '🎨 找出不一样的色块';
        tip.style.color = '#333';
        startTime = Date.now();
        timer = setInterval(() => {
            timeText.innerText = Math.floor((Date.now() - startTime) / 1000);
        }, 1000);
        newRound();
    }

    function reset() {
        clearInterval(timer);
        playing = false;
        score = 0;
        level = 1;
        startTime = 0;
        scoreText.innerText = 0;
        timeText.innerText = 0;
        levelText.innerText = 1;
        tip.innerText = '';
        startBtn.disabled = false;
        diffPanel.style.display = 'none';
        grid.innerHTML = '';
    }

    startBtn.onclick = start;
    resetBtn.onclick = reset;
</script>
</body>

</html>
